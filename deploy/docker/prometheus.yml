# AVP local Prometheus scrape config (Step 2)
# Platform API and agent metrics targets will be added in later steps.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: avp-platform
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:9464']
        labels:
          service: platform
