name: avp

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: avp
      POSTGRES_USER: avp
      POSTGRES_PASSWORD: avp_dev_password
    ports:
      # Host 5433 avoids conflict with a local Postgres often bound to localhost:5432
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U avp']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2.10-alpine
    # -js: JetStream; -sd: store dir; -m: HTTP monitoring (required for /healthz)
    command: ['-js', '-sd', '/data', '-m', '8222']
    ports:
      - '4222:4222'
      - '8222:8222'
    volumes:
      - natsdata:/data
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1:8222/healthz']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  jaeger:
    image: jaegertracing/all-in-one:1.58
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    ports:
      - '16686:16686'
      - '4318:4318'
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://localhost:14269/ || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - '3100:3000'
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana:/var/lib/grafana
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://localhost:3000/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:9090/-/healthy']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: avp
      MINIO_ROOT_PASSWORD: avp_dev_password
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  pgdata:
  natsdata:
  grafana:
  miniodata:
